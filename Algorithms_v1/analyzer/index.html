<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Vault Access</title>
    <style>
        body {
            background: #000;
            color: #00ff00;
            font-family: "Courier New", Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-transform: uppercase;
        }

        #loading-container {
            width: 300px;
            text-align: center;
        }

        #progress-bar {
            width: 100%;
            height: 10px;
            border: 1px solid #00ff00;
            margin-top: 10px;
            position: relative;
        }

        #progress-fill {
            width: 0%;
            height: 100%;
            background: #00ff00;
            transition: width 0.1s;
        }

        #status {
            margin-bottom: 5px;
            font-size: 14px;
        }
    </style>
</head>

<body>
    <div id="loading-container">
        <div id="status">Initializing system...</div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
