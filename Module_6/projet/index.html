<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Tâches</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>

    <main class="container">
        <h1>My TODO list</h1>
        <p class="counter"></p>

        <ul class="task-list">
        </ul>
        <div class="add-field">
            <button id="btn-new-task">New Task</button>
            <form id="add-form" class="add-form">
                <div class="input-field">
                    <input type="text" id="new-task-field" name="task" placeholder="Add new task...">
                    <span class="message-error" id="error-task"></span>
                </div>
                <button type="submit" class="add-btn">Add new task</button>
            </form>
        </div>
        <div class="filters">
            <button class="btn-filter actif" data-filter="all">All</button>
            <button class="btn-filter" data-filter="active">Active</button>
            <button class="btn-filter" data-filter="done">Done</button>
        </div>
        <input type="text" id="searching" placeholder="Find a task...">
        <div class="sort">
            <button id="sort-name">Sort by name</button>
        </div>
        <div id="stats"></div>
    </main>

</body>

</html>
