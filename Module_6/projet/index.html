<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Tâches</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>

    <main class="container">
        <h1>Ma Liste de Tâches</h1>
        <p class="counter"></p>

        <ul class="task-list">
            <li class="task" data-status="active">
                <span class="task-text">Faire les courses</span>
                <button class="delete-btn">X</button>
            </li>
            <li class="task done" data-status="done">
                <span class="task-text">Reviser JavaScript</span>
                <button class="delete-btn">X</button>
            </li>
            <li class="task" data-status="active">
                <span class="task-text">Ranger le bureau</span>
                <button class="delete-btn">X</button>
            </li>
        </ul>
        <div class="add-field">
            <button id="btn-new-task">New Task</button>
            <form id="add-form" class="add-form">
                <div class="input-field">
                    <input type="text" id="new-task-field" name="task" placeholder="Ajouter une tache...">
                    <span class="message-error" id="error-task"></span>
                </div>
                <button type="submit" class="add-btn">Ajouter</button>
            </form>
        </div>
        <div class="filtres">
            <button class="btn-filtre actif" data-filtre="toutes">Toutes</button>
            <button class="btn-filtre" data-filtre="actives">Actives</button>
            <button class="btn-filtre" data-filtre="terminees">Terminees</button>
        </div>
        <input type="text" id="recherche" placeholder="Rechercher une tache...">
        <div class="tri">
            <button id="tri-nom">Trier par nom</button>
            <button id="tri-date">Trier par date</button>
        </div>
        <div id="stats"></div>
    </main>

</body>

</html>
