<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Répertoire de Contacts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>Mes Contacts</h1>
        <p id="counter">0 contact enregistré</p>
        <ul id="contact-list">
        </ul>
        <form id="contact-form">
            <div class="input-group">
                <input type="text" id="name" placeholder="Nom complet" required>
                <input type="tel" id="phone" placeholder="Numéro de téléphone" required>
            </div>
            <button type="submit" id="add-btn">Ajouter au répertoire</button>
        </form>

        
    </div>

    <script src="render.js"></script>
</body>

</html>
