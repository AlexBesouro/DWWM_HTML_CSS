<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>Creer et supprimer des elements</title>
    <script src="creation.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        .liste {
            list-style: none;
            padding: 0;
        }

        .liste li {
            padding: 8px;
            margin: 4px 0;
            background: #f0f0f0;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <h1>Ma liste de courses</h1>
    <ul class="liste" id="courses">
        <li>Lait</li>
        <li>Pain</li>
    </ul>
</body>

</html>
