<body>
    <div id="grand-parent" style="padding: 20px; background: #ddd;">
        DIV (grand-parent)

            <li class="enfant" style="padding: 10px; background: #999;">LI 2 (enfant)</li>
            <li class="enfant" style="padding: 10px; background: #999;">LI 3 (enfant)</li>

    </div>
    <div>
        <input type="text" id="champ-couleur" placeholder="Entrez une couleur">
        <button id="btn-ajouter">Ajouter</button>
        
        <ul id="liste-couleurs">
            <li>Rouge <button class="btn-supprimer">X</button></li>
            <li>Bleu <button class="btn-supprimer">X</button></li>
