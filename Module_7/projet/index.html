<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Document</title>
        <link rel="stylesheet" href="style.css">
        <script defer src="script.js"></script>
    </head>
    <body class="">
        <header class="main-header">
            <div class="search-container">
                <label for="name-search" class="visually-hidden">Search by name</label>
                <div class="search-wrapper">
                    <input type="search" id="name-search" class="search-input" placeholder="Enter the name of card..."
                        aria-label="Enter the name of card">
                    <button class="search-submit" aria-label="Search">
                        <span class="icon" aria-hidden="true">🔍</span>
                    </button>
                </div>
            </div>
        
            <button class="btn-header" title="Ascending order">
                <span class="btn-text">Asc order</span>
                <span class="icon">📅</span>
            </button>
        </header>
        <div class="background">
                <main>
                    <button class="btn add-day" type="button">
                        <span class="btn-icon">+</span>
                        <span class="btn-text">Add done's for the day </span>
                    </button>
                    <button class="btn summary" type="button">
                        <span class="btn-text">See statistics </span>
                    </button>
                
                    <div class="tasks-grid"></div>
                    <div class="modal">
                        <div class="container-day active add-task-modal">
                            <button class="close-modal" type="button" aria-label="Close modal">X</button>
                            <h3 class="card-name">Add New Task</h3>
                            <form class="add-task-form">
                                <div class="form-group">
                                    <label for="task-name">Task Name:</label>
                                    <input type="text" id="task-name" name="name" required>
                                </div>
                                <div class="form-group">
                                    <label for="task-lead-time">Lead Time:</label>
                                    <input type="text" id="task-lead-time" name="leadTime" required>
                                </div>
                                <div class="form-group">
                                    <label for="task-score">Score (1-5):</label>
                                    <input type="number" id="task-score" name="score" min="1" max="5" required>
                                </div>
                                <div class="form-group">
                                    <label for="task-description">Description:</label>
                                    <textarea id="task-description" name="description" rows="4" required></textarea>
                                </div>
                                <button type="submit" class="btn submit-btn">Add Task</button>
                                <div class="form-group">
                                    <label for="task-date">Date:</label>
                                    <input type="date" id="task-date" name="date" max="2026-04-19" required>
                                </div>
                            </form>
                        </div>
                    </div>
                </main>
        </div>
        <footer>
            <p>&copy; 2026 All rights reserved</p>
        </footer>
    </body>
</html>
