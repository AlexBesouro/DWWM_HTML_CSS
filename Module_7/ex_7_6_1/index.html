<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Animation Practice</title>
    <script defer src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>CSS Animation Practice Playground</h1>

    <!-- ================= HOVER ANIMATIONS ================= -->
    <section>
        <h2>Hover Animations</h2>

        <div class="box hover-scale"></div>
        <!-- Add scale animation on hover -->

        <div class="box hover-rotate"></div>
        <!-- Add rotation animation on hover -->

    </section>


    <!-- ================= TRANSITION ANIMATIONS ================= -->
    <section>
        <h2>Transition Animations</h2>
        <div class="card card-transition" >
        <div class="transition-move">Move me</div>
        <!-- Add transition: move (translate) on hover or click -->
        </div>
    </section>


    <!-- ================= KEYFRAME ANIMATIONS ================= -->
    <section>
        <h2>Keyframe Animations</h2>

        <div class="circle keyframe-bounce"></div>
        <!-- Create @keyframes bounce animation -->

    </section>


    <!-- ================= TEXT ANIMATIONS ================= -->
    <section>
        <h2>Text Animations</h2>

        <div class="text text-fade">Fade In Text</div>
        <!-- Add fade-in animation -->

        <div class="text text-slide">Slide Text</div>
        <!-- Add slide-in from left/right animation -->
    </section>


    <!-- ================= LOADING ANIMATIONS ================= -->
    <section>
        <h2>Loading Animations</h2>

        <div class="circle loader-spin"></div>
        <!-- Create loader spinning animation -->

        <div class="circle loader-pulse"></div>
        <!-- Create pulse (scale in/out) animation -->
    </section>


    <!-- ================= SCROLL ANIMATIONS ================= -->
    <section style="height: 300px;">
        <h2>Scroll Animations</h2>

        <div class="card scroll-reveal">Reveal on scroll</div>
        <!-- Add animation when element appears in viewport (JS + CSS) -->
    </section>


</body>

</html>
